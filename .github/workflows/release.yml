name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web bundle
        working-directory: web
        run: npm run build

      - name: Package web bundle
        run: tar -czf tracing-web-dist.tar.gz -C web dist

      - name: Lint and validate Helm chart
        run: |
          helm lint deploy/helm/tracing
          helm template tracing deploy/helm/tracing > /dev/null

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

      - name: Package Helm chart
        run: helm package deploy/helm/tracing --destination .

      - name: Release collector artifacts
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      - name: Build and push web image
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository_owner }}/tracing-web:${{ github.ref_name }}

      - name: Promote stable web image to latest
        if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/tracing-web:latest \
            ghcr.io/${{ github.repository_owner }}/tracing-web:${{ github.ref_name }}

      - name: Attach web bundle and chart
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tracing-web-dist.tar.gz
            tracing-*.tgz
