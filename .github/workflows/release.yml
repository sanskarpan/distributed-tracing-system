name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web bundle
        working-directory: web
        run: npm run build

      - name: Package web bundle
        run: tar -czf tracing-web-dist.tar.gz -C web dist

      - name: Package Helm chart
        run: helm package deploy/helm/tracing --destination .

      - name: Release collector artifacts
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach web bundle and chart
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tracing-web-dist.tar.gz
            tracing-*.tgz
