services:
  collector:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4318:4318"
      - "4317:4317"
    environment:
      - TZ=UTC
      - DATA_DIR=/var/lib/tracing
    volumes:
      - collector-data:/var/lib/tracing
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4318/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      collector:
        condition: service_healthy
    restart: unless-stopped

  demo:
    build:
      context: .
      dockerfile: Dockerfile.demo
    environment:
      - COLLECTOR_URL=http://collector:4318
    depends_on:
      collector:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - demo

  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      collector:
        condition: service_healthy
    profiles:
      - observability

  grafana:
    image: grafana/grafana:12.1.1
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    profiles:
      - observability

volumes:
  collector-data:
