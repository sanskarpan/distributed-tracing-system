version: 2

project_name: tracing

builds:
  - id: collector
    main: ./cmd/collector
    binary: collector
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

dockers_v2:
  - id: collector-image
    ids:
      - collector
    dockerfile: Dockerfile
    images:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/tracing-collector"
    tags:
      - "{{ .Version }}"
    platforms:
      - linux/amd64
      - linux/arm64
